<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Приглашение в AdaptaAI</title>
</head>
<body style="font-family: Inter, sans-serif; color: #1a1a2e; background: #f5f5f5; padding: 32px;">
  <div style="max-width: 600px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 40px;">
    <h1 style="color: #0A5E5C;">AdaptaAI</h1>
    <p>Здравствуйте, {{first_name}} {{last_name}}!</p>
    <p>Компания <strong>{{company_name}}</strong> приглашает вас присоединиться к платформе AdaptaAI
       для адаптации на рабочем месте.</p>
    <a href="{{invite_url}}"
       style="display:inline-block; margin-top:16px; padding:12px 24px;
              background:#0A5E5C; color:#fff; border-radius:8px; text-decoration:none;">
      Принять приглашение
    </a>
    <p style="margin-top:24px; font-size:12px; color:#888;">
      Ссылка действительна 7 дней. Если вы не ожидали этого письма — просто проигнорируйте его.
    </p>
  </div>
</body>
</html>
