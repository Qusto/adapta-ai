services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adapta}
      POSTGRES_USER: ${POSTGRES_USER:-adapta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-string}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adapta}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: adapta-api
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-adapta}:${POSTGRES_PASSWORD:-change-me-strong-string}@postgres:5432/${POSTGRES_DB:-adapta}
      GIGACHAT_CA_BUNDLE_PATH: /app/certs/russian_trusted_root_ca.pem
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - ./certs/russian_trusted_root_ca.pem:/app/certs/russian_trusted_root_ca.pem:ro
      - api_data:/app/data
      - ../b2c:/app/static/b2c:ro
      - ../b2b:/app/static/b2b:ro
      - ../design-tokens.css:/app/static/design-tokens.css:ro
      - ../i18n.js:/app/static/i18n.js:ro
      - ../mock-data.js:/app/static/mock-data.js:ro
      # Backend code mounted from host for faster iteration without image rebuild.
      - ../backend/app:/app/app:ro
      - ../backend/migrations:/app/migrations:ro
      - ../backend/scripts:/app/scripts:ro
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/healthz', timeout=2).raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  api_data:
